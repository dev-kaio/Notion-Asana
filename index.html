<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asana 2</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="w3-sidebar w3-bar-block w3-border-right" id="mySidebar">
          <button
            onclick="w3_close()"
            class="w3-bar-item w3-xlarge"
            style="cursor: pointer; height: 5.5vh"
          >
            Fechar
          </button>
          <a href="#" class="w3-bar-item w3-button w3-large w3-margin-top"
            >Insights</a
          >
          <a href="#" class="w3-bar-item w3-button w3-large w3-margin-top"
            >Projetos</a
          >
          <a href="#" class="w3-bar-item w3-button w3-large w3-margin-top"
            >Equipes</a
          >
        </div>
        <button class="w3-button w3-xlarge" onclick="w3_open()">☰</button>
      </nav>
    </header>

    <main style="margin-left: 200px; padding: 20px">
      <div class="calendar-toolbar">
        <button id="add-task" class="w3-button w3-border w3-round-xlarge">
          Adicionar Tarefa
        </button>
        <div class="calendar-nav">
          <span id="current-month" style="padding: 10px"></span>
          <button id="prev-month" class="w3-round-xlarge w3-button w3-border">❰</button>
          <button id="next-month" class="w3-round-xlarge w3-button w3-border">❱</button>
        </div>
      </div>

      <div class="calendar">
        <div class="calendar-weekdays">
          <div>SEG</div>
          <div>TER</div>
          <div>QUA</div>
          <div>QUI</div>
          <div>SEX</div>
          <div>SÁB</div>
          <div>DOM</div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
    </main>

    <script src="calendario.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
